<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三月空间 · 进入网站</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --pink: #ff2d55;
            --cyan: #00f3ff;
            --bg: #080808;
            --card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
        }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Noto Sans SC', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -20%; left: 50%;
            transform: translateX(-50%);
            width: 800px; height: 500px;
            background: radial-gradient(ellipse, rgba(255,45,85,0.12), transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ── 微信引导蒙层 ── */
        #wechatGuide {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.92);
            z-index: 999;
            padding: 20px;
        }
        .wc-arrow {
            position: absolute;
            top: 12px; right: 16px;
            text-align: right;
        }
        .wc-arrow img {
            width: 60px;
            opacity: 0.9;
        }
        .wc-box {
            position: absolute;
            top: 70px; right: 16px;
            background: #1a1a1a;
            border: 1px solid rgba(255,45,85,0.3);
            border-radius: 14px;
            padding: 24px 22px;
            max-width: 280px;
            text-align: center;
        }
        .wc-step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            text-align: left;
        }
        .wc-step:last-child { margin-bottom: 0; }
        .wc-num {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--pink);
            color: #fff;
            font-size: 0.85em;
            font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .wc-text { font-size: 0.9em; color: #ccc; line-height: 1.5; }
        .wc-text strong { color: #fff; }
        .wc-close {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #666;
            font-size: 0.8em;
            cursor: pointer;
        }
        /* 右上角指引箭头SVG */
        .wc-pointer {
            position: absolute;
            top: 0; right: 0;
            width: 120px;
        }

        /* ── 主内容 ── */
        .wrap {
            position: relative;
            z-index: 1;
            max-width: 520px;
            margin: 0 auto;
            padding: 56px 24px 80px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.75em;
            letter-spacing: 0.25em;
            color: #444;
        }
        .logo-main {
            font-size: 1.7em;
            font-weight: 900;
            margin-top: 6px;
        }
        .logo-main span { color: var(--pink); }

        /* ── 主行动区 ── */
        .cta-box {
            background: var(--card);
            border: 1px solid rgba(255,45,85,0.25);
            border-radius: 20px;
            padding: 36px 28px;
            text-align: center;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }
        .cta-box::before {
            content: '';
            position: absolute; inset: -1px;
            border-radius: 20px;
            background: linear-gradient(135deg, rgba(255,45,85,0.15), transparent, rgba(0,243,255,0.08));
            z-index: -1;
        }
        .cta-eyebrow {
            font-size: 0.7em;
            letter-spacing: 0.18em;
            color: #555;
            margin-bottom: 10px;
        }
        .cta-title {
            font-size: 1.45em;
            font-weight: 900;
            margin-bottom: 6px;
        }
        .cta-sub {
            font-size: 0.83em;
            color: #555;
            margin-bottom: 28px;
            line-height: 1.6;
        }

        /* 浏览器打开按钮（非微信环境显示） */
        #browserBtn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--pink), #c9184a);
            color: #fff;
            font-size: 1.05em;
            font-weight: 900;
            padding: 16px 36px;
            border-radius: 50px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            width: 100%;
            justify-content: center;
            margin-bottom: 16px;
        }
        #browserBtn:hover { opacity: 0.9; }

        /* 微信环境 - 提示按钮 */
        #wechatBtn {
            display: none;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #07c160, #059848);
            color: #fff;
            font-size: 1.05em;
            font-weight: 900;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin-bottom: 16px;
        }

        .copy-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 14px;
        }
        .copy-domain {
            flex: 1;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85em;
            color: var(--cyan);
            letter-spacing: 0.05em;
        }
        .copy-btn {
            background: rgba(0,243,255,0.1);
            border: 1px solid rgba(0,243,255,0.25);
            color: var(--cyan);
            font-size: 0.78em;
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
        }
        .copy-btn:active { opacity: 0.7; }

        /* ── 内容卡片 ── */
        .section-label {
            font-size: 0.68em;
            letter-spacing: 0.2em;
            color: #444;
            text-align: center;
            margin-bottom: 6px;
        }
        .section-title {
            font-size: 1.2em;
            font-weight: 900;
            text-align: center;
            margin-bottom: 20px;
        }
        .cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px 16px;
            position: relative;
            overflow: hidden;
        }
        .card.hot { border-color: rgba(255,45,85,0.3); background: rgba(255,45,85,0.05); }
        .card.cool { border-color: rgba(0,243,255,0.18); background: rgba(0,243,255,0.03); }
        .card-tag {
            position: absolute; top: 10px; right: 10px;
            font-size: 0.58em; font-weight: 900;
            padding: 2px 7px; border-radius: 8px;
            background: var(--pink); color: #fff;
        }
        .card-tag.new { background: rgba(0,243,255,0.15); color: var(--cyan); border: 1px solid rgba(0,243,255,0.3); }
        .card-icon { font-size: 1.5em; margin-bottom: 8px; }
        .card-title { font-size: 0.9em; font-weight: 900; margin-bottom: 4px; }
        .card-desc { font-size: 0.75em; color: #555; line-height: 1.6; }

        @media (max-width: 420px) {
            .wrap { padding: 40px 16px 60px; }
            .cta-box { padding: 28px 18px; }
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- 微信引导蒙层 -->
<div id="wechatGuide">
    <!-- 右上角箭头指引 -->
    <svg class="wc-pointer" viewBox="0 0 120 80" fill="none">
        <path d="M100 10 Q110 10 110 20 L110 60" stroke="#ff2d55" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M104 6 L100 10 L106 13" stroke="#ff2d55" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <circle cx="110" cy="65" r="4" fill="#ff2d55"/>
    </svg>

    <div class="wc-box">
        <div style="font-size:0.85em;color:#888;margin-bottom:16px;letter-spacing:0.05em;">请按以下步骤操作</div>
        <div class="wc-step">
            <div class="wc-num">1</div>
            <div class="wc-text">点击右上角 <strong>···</strong> 按钮</div>
        </div>
        <div class="wc-step">
            <div class="wc-num">2</div>
            <div class="wc-text">选择 <strong>「在默认浏览器中打开」</strong></div>
        </div>
        <div class="wc-step">
            <div class="wc-num">3</div>
            <div class="wc-text">即可正常访问完整内容</div>
        </div>
        <button class="wc-close" onclick="document.getElementById('wechatGuide').style.display='none'">我知道了</button>
    </div>
</div>

<div class="wrap">

    <!-- Logo -->
    <div class="logo">
        <div class="logo-text">NEXUS · CONSOLE</div>
        <div class="logo-main">三月<span>空间</span></div>
    </div>

    <!-- 主行动区 -->
    <div class="cta-box">
        <div class="cta-eyebrow">ENTER SITE · 进入网站</div>
        <div class="cta-title">点击下方进入</div>
        <div class="cta-sub">工具导航 · TikTok课程 · 自动化工具 · 站长社群</div>

        <!-- 非微信：直接跳转按钮 -->
        <a id="browserBtn" href="https://sanyue.help" target="_blank">
            <i class="fas fa-arrow-right"></i> 立即进入网站
        </a>

        <!-- 微信内：引导用浏览器打开 -->
        <button id="wechatBtn" onclick="document.getElementById('wechatGuide').style.display='flex'">
            <i class="fab fa-weixin"></i> 点这里 → 用浏览器打开
        </button>

        <!-- 复制网址 -->
        <div class="copy-row">
            <span class="copy-domain">sanyue.help</span>
            <button class="copy-btn" onclick="copyDomain()">复制网址</button>
        </div>
    </div>

    <!-- 内容亮点 -->
    <div class="section-label">WHAT'S INSIDE</div>
    <div class="section-title">进去能找到什么</div>

    <div class="cards">
        <div class="card hot">
            <div class="card-tag">HOT</div>
            <div class="card-icon">🎬</div>
            <div class="card-title">TikTok 入门课</div>
            <div class="card-desc">0基础到运营，14节完整课程</div>
        </div>
        <div class="card cool">
            <div class="card-tag new">NEW</div>
            <div class="card-icon">🤖</div>
            <div class="card-title">N8N 自动化</div>
            <div class="card-desc">AI视频切片、二创、混剪流水线</div>
        </div>
        <div class="card">
            <div class="card-icon">👥</div>
            <div class="card-title">站长社群</div>
            <div class="card-desc">一起研究搞钱，共同成长</div>
        </div>
        <div class="card">
            <div class="card-icon">🛠️</div>
            <div class="card-title">工具导航</div>
            <div class="card-desc">精选工具合集，省去踩坑时间</div>
        </div>
    </div>

</div>

<script>
    // 检测微信浏览器
    var isWeChat = /MicroMessenger/i.test(navigator.userAgent);
    if (isWeChat) {
        document.getElementById('browserBtn').style.display = 'none';
        document.getElementById('wechatBtn').style.display = 'flex';
        document.getElementById('wechatBtn').style.alignItems = 'center';
        document.getElementById('wechatBtn').style.justifyContent = 'center';
        document.getElementById('wechatBtn').style.gap = '8px';
    }

    function copyDomain() {
        navigator.clipboard.writeText('https://sanyue.help').then(function() {
            var btn = document.querySelector('.copy-btn');
            btn.textContent = '已复制 ✓';
            btn.style.color = '#4ade80';
            setTimeout(function() {
                btn.textContent = '复制网址';
                btn.style.color = '';
            }, 2000);
        });
    }
</script>
</body>
</html>
