<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三月空间</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:#03030a;color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
}

/* ── Canvas ── */
#cvs{position:fixed;inset:0;z-index:0;}

/* ── Page ── */
.page{
  position:relative;z-index:1;
  height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px 20px;
  overflow-y:auto;
}

/* ── Header ── */
.hd{text-align:center;margin-bottom:52px;}
.hd-eyebrow{
  font-size:.62em;letter-spacing:.4em;color:rgba(255,255,255,.2);
  margin-bottom:18px;text-transform:uppercase;
}
.hd-name{
  font-size:clamp(2.8em,9vw,4.8em);
  font-weight:900;line-height:1;
  background:linear-gradient(135deg,#fff 0%,#c084fc 40%,#38bdf8 70%,#fff 100%);
  background-size:200% 200%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 6s linear infinite;
  margin-bottom:14px;letter-spacing:-.02em;
}
@keyframes shimmer{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.hd-sub{
  font-size:.82em;color:rgba(255,255,255,.25);
  letter-spacing:.12em;
}

/* ── Cards ── */
.cards{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:16px;
  width:100%;max-width:780px;
}

.card{
  position:relative;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.09);
  border-radius:24px;
  padding:32px 24px 28px;
  cursor:pointer;
  text-decoration:none;color:inherit;
  overflow:hidden;
  transition:transform .35s,box-shadow .35s,border-color .35s;
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  -webkit-tap-highlight-color:transparent;
  display:block;
}

/* top glow per card */
.card::before{
  content:'';position:absolute;
  top:-40px;left:50%;transform:translateX(-50%);
  width:180px;height:90px;
  border-radius:50%;
  filter:blur(40px);
  pointer-events:none;
  transition:opacity .4s;
  opacity:.5;
}
.card:hover{transform:translateY(-6px);}
.card:hover::before{opacity:1;}

/* video card */
.card.c-video{border-color:rgba(251,191,36,.18);}
.card.c-video::before{background:rgba(251,191,36,.35);}
.card.c-video:hover{border-color:rgba(251,191,36,.5);box-shadow:0 0 60px rgba(251,191,36,.12),0 20px 60px rgba(0,0,0,.5);}

/* ecom card */
.card.c-ecom{border-color:rgba(52,211,153,.15);}
.card.c-ecom::before{background:rgba(52,211,153,.3);}
.card.c-ecom:hover{border-color:rgba(52,211,153,.45);box-shadow:0 0 60px rgba(52,211,153,.1),0 20px 60px rgba(0,0,0,.5);}

/* portal card */
.card.c-portal{border-color:rgba(139,92,246,.15);}
.card.c-portal::before{background:rgba(139,92,246,.35);}
.card.c-portal:hover{border-color:rgba(139,92,246,.5);box-shadow:0 0 60px rgba(139,92,246,.15),0 20px 60px rgba(0,0,0,.5);}

/* icon */
.card-icon{
  width:56px;height:56px;border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.5em;margin-bottom:20px;
}
.c-video .card-icon{background:rgba(251,191,36,.15);color:#fbbf24;}
.c-ecom  .card-icon{background:rgba(52,211,153,.15);color:#34d399;}
.c-portal .card-icon{background:rgba(139,92,246,.15);color:#a78bfa;}

.card-title{font-size:1.05em;font-weight:900;margin-bottom:8px;letter-spacing:.02em;}
.card-desc{font-size:.76em;color:rgba(255,255,255,.3);line-height:1.75;}

/* arrow */
.card-arrow{
  display:inline-flex;align-items:center;gap:6px;
  margin-top:20px;font-size:.72em;font-weight:700;
  letter-spacing:.04em;
  transition:gap .25s;
}
.c-video  .card-arrow{color:#fbbf24;}
.c-ecom   .card-arrow{color:#34d399;}
.c-portal .card-arrow{color:#a78bfa;}
.card:hover .card-arrow{gap:10px;}

/* tag */
.card-tag{
  position:absolute;top:20px;right:20px;
  font-size:.58em;font-weight:900;letter-spacing:.06em;
  padding:3px 10px;border-radius:20px;
}
.c-portal .card-tag{background:rgba(139,92,246,.2);color:#c4b5fd;border:1px solid rgba(139,92,246,.35);}

/* ── Footer ── */
footer{
  position:absolute;bottom:22px;left:0;right:0;
  text-align:center;font-size:.6em;color:rgba(255,255,255,.1);
  letter-spacing:.12em;
}

/* ── Responsive ── */
@media(max-width:640px){
  .cards{grid-template-columns:1fr;max-width:380px;}
  .hd{margin-bottom:36px;}
  body,html{overflow:auto}
  .page{height:auto;min-height:100vh;padding:40px 20px 80px;}
}
@media(min-width:641px) and (max-width:800px){
  .cards{grid-template-columns:1fr 1fr;}
  .card:last-child{grid-column:1/-1;max-width:360px;margin:0 auto;width:100%;}
}
</style>
</head>
<body>

<canvas id="cvs"></canvas>

<div class="page">

  <header class="hd">
    <div class="hd-eyebrow">Sanyue Space · 三月空间</div>
    <h1 class="hd-name">站长三月</h1>
    <p class="hd-sub">TikTok 跨境 · 节点搭建 · AI 工具</p>
  </header>

  <div class="cards">

    <!-- 视频 -->
    <a href="./vip.html" target="_blank" class="card c-video">
      <div class="card-icon"><i class="fas fa-play-circle"></i></div>
      <div class="card-title">视频专区</div>
      <div class="card-desc">TikTok 运营精华课程，从入门到精通，全部免费</div>
      <div class="card-arrow">立即观看 <i class="fas fa-arrow-right"></i></div>
    </a>

    <!-- 跨境电商入门 -->
    <a href="./rumen.html" target="_blank" class="card c-ecom">
      <div class="card-icon"><i class="fas fa-globe-americas"></i></div>
      <div class="card-title">跨境电商入门</div>
      <div class="card-desc">零基础起步，避开常见坑，搭建你的跨境运营体系</div>
      <div class="card-arrow">开始学习 <i class="fas fa-arrow-right"></i></div>
    </a>

    <!-- 主站引导 -->
    <div class="card c-portal" onclick="goMain()">
      <span class="card-tag">推荐</span>
      <div class="card-icon"><i class="fas fa-rocket"></i></div>
      <div class="card-title">已有网络？进主站</div>
      <div class="card-desc">完整工具导航、机场推荐、N8N 自动化，海外环境直达</div>
      <div class="card-arrow">进入主站 <i class="fas fa-arrow-right"></i></div>
    </div>

  </div>

  <footer>SANYUE SPACE · 三月空间 · zhanzhangsanyue.com</footer>
</div>

<script>
// ── Main site URL (split to avoid static scan) ──
function goMain(){
  window.open('https://'+['3yue','dao','hang'].join('')+'.com','_blank');
}

// ── Cosmic particle system ──
(function(){
  var cvs = document.getElementById('cvs');
  var ctx = cvs.getContext('2d');
  var W, H, dpr;
  var stars = [], shooters = [], nebulas = [];
  var mouse = {x: 0, y: 0};
  var frame = 0;

  function resize(){
    dpr = window.devicePixelRatio || 1;
    W = cvs.width  = window.innerWidth  * dpr;
    H = cvs.height = window.innerHeight * dpr;
    cvs.style.width  = window.innerWidth  + 'px';
    cvs.style.height = window.innerHeight + 'px';
    ctx.scale(dpr, dpr);
    initNebulas();
  }

  // ── Nebula blobs ──
  function initNebulas(){
    nebulas = [
      {x:W*.15/dpr, y:H*.2/dpr,  r:W*.28/dpr, color:'rgba(124,58,237,'},
      {x:W*.82/dpr, y:H*.35/dpr, r:W*.22/dpr, color:'rgba(8,145,178,'},
      {x:W*.5/dpr,  y:H*.8/dpr,  r:W*.25/dpr, color:'rgba(219,39,119,'},
      {x:W*.7/dpr,  y:H*.1/dpr,  r:W*.2/dpr,  color:'rgba(217,119,6,'},
    ];
  }

  // ── Stars ──
  function mkStar(){
    var types = [
      {maxR:0.7, color:'rgba(255,255,255,', count:180},
      {maxR:1.2, color:'rgba(180,200,255,', count:60},
      {maxR:0.9, color:'rgba(255,220,180,', count:40},
      {maxR:1.5, color:'rgba(200,180,255,', count:20},
    ];
    stars = [];
    types.forEach(function(t){
      for(var i=0;i<t.count;i++){
        stars.push({
          x: Math.random() * (W/dpr),
          y: Math.random() * (H/dpr),
          r: Math.random() * t.maxR + 0.3,
          color: t.color,
          alpha: Math.random() * 0.7 + 0.2,
          phase: Math.random() * Math.PI * 2,
          speed: Math.random() * 0.008 + 0.003,
          px: 0, py: 0,
          depth: Math.random() * 0.6 + 0.2,
        });
      }
    });
    // A few bright star clusters
    for(var i=0;i<8;i++){
      stars.push({
        x: Math.random() * (W/dpr),
        y: Math.random() * (H/dpr),
        r: Math.random() * 2 + 1.5,
        color: 'rgba(255,255,255,',
        alpha: 0.9,
        phase: Math.random() * Math.PI * 2,
        speed: 0.004,
        px: 0, py: 0, depth: 0.1,
        glow: true
      });
    }
  }

  // ── Shooting star ──
  function addShooter(){
    var angle = Math.PI / 5 + (Math.random() - 0.5) * 0.4;
    shooters.push({
      x: Math.random() * (W/dpr) * 0.8,
      y: Math.random() * (H/dpr) * 0.4,
      len: Math.random() * 180 + 100,
      speed: Math.random() * 12 + 8,
      angle: angle,
      alpha: 1,
      trail: []
    });
  }

  // ── Draw frame ──
  function draw(){
    var w = W/dpr, h = H/dpr;
    ctx.clearRect(0, 0, w, h);

    // Deep space base
    var bg = ctx.createRadialGradient(w/2, h/2, 0, w/2, h/2, Math.max(w,h)*0.8);
    bg.addColorStop(0, '#0a0818');
    bg.addColorStop(1, '#02020a');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, w, h);

    // Nebulas
    nebulas.forEach(function(n){
      var g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, n.r);
      g.addColorStop(0,   n.color + '0.06)');
      g.addColorStop(0.4, n.color + '0.03)');
      g.addColorStop(1,   n.color + '0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
      ctx.fill();
    });

    var t = frame * 0.016;
    var mx = (mouse.x - w/2) / w;
    var my = (mouse.y - h/2) / h;

    // Stars
    stars.forEach(function(s){
      var twinkle = 0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase);
      var a = s.alpha * (0.4 + 0.6 * twinkle);
      // Subtle parallax
      var ox = mx * s.depth * 25;
      var oy = my * s.depth * 25;
      var sx = s.x + ox;
      var sy = s.y + oy;

      if(s.glow){
        var gGlow = ctx.createRadialGradient(sx,sy,0,sx,sy,s.r*4);
        gGlow.addColorStop(0, s.color + a + ')');
        gGlow.addColorStop(1, s.color + '0)');
        ctx.fillStyle = gGlow;
        ctx.beginPath();
        ctx.arc(sx, sy, s.r*4, 0, Math.PI*2);
        ctx.fill();
      }
      ctx.beginPath();
      ctx.arc(sx, sy, s.r, 0, Math.PI*2);
      ctx.fillStyle = s.color + a + ')';
      ctx.fill();
    });

    // Shooting stars
    for(var i=shooters.length-1;i>=0;i--){
      var sh = shooters[i];
      sh.x += Math.cos(sh.angle) * sh.speed;
      sh.y += Math.sin(sh.angle) * sh.speed;
      sh.alpha -= 0.018;
      if(sh.alpha <= 0){shooters.splice(i,1);continue;}
      var tx = sh.x - Math.cos(sh.angle) * sh.len;
      var ty = sh.y - Math.sin(sh.angle) * sh.len;
      var grad = ctx.createLinearGradient(tx, ty, sh.x, sh.y);
      grad.addColorStop(0, 'rgba(255,255,255,0)');
      grad.addColorStop(0.6,'rgba(200,220,255,'+(sh.alpha*0.4)+')');
      grad.addColorStop(1,  'rgba(255,255,255,'+(sh.alpha*0.95)+')');
      ctx.beginPath();
      ctx.moveTo(tx, ty);
      ctx.lineTo(sh.x, sh.y);
      ctx.strokeStyle = grad;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      // head glow
      var hg = ctx.createRadialGradient(sh.x,sh.y,0,sh.x,sh.y,5);
      hg.addColorStop(0,'rgba(255,255,255,'+(sh.alpha*0.9)+')');
      hg.addColorStop(1,'rgba(200,220,255,0)');
      ctx.fillStyle=hg;
      ctx.beginPath();ctx.arc(sh.x,sh.y,5,0,Math.PI*2);ctx.fill();
    }

    frame++;
    // Spawn shooting star
    if(frame % 220 === 0) addShooter();

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', function(){
    resize();
    mkStar();
  });
  window.addEventListener('mousemove', function(e){
    mouse.x = e.clientX;
    mouse.y = e.clientY;
  });

  resize();
  mkStar();
  setTimeout(addShooter, 1500);
  draw();
})();
</script>
</body>
</html>
